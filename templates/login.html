<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>NERVE – Login</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0c0c18;color:#f0ebe0;font-family:'Segoe UI',sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#0c0c18;border:1px solid #1a1a2e;border-radius:12px;
    padding:36px 40px;width:100%;max-width:380px}
  .logo{font-size:22px;font-weight:800;margin-bottom:28px;text-align:center}
  .logo span{color:#E8B040}
  label{display:block;font-size:11px;font-weight:700;letter-spacing:.07em;
    color:#6b6b80;text-transform:uppercase;margin-bottom:6px;margin-top:16px}
  input{width:100%;background:#0c0c18;border:1px solid #1a1a2e;border-radius:6px;
    color:#f0ebe0;font-size:14px;padding:10px 12px;outline:none}
  input:focus{border-color:#E8B040}
  .btn{width:100%;background:#E8B040;color:#0c0c18;border:none;border-radius:8px;
    padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-top:24px}
  .btn:hover{opacity:.85}
  .flash{background:#1a0a0a;border:1px solid #e05c5c;color:#e05c5c;
    border-radius:6px;padding:8px 12px;font-size:13px;margin-bottom:16px}
  .flash.success{background:#0a1a12;border-color:#E8B040;color:#E8B040}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Sales<span>Nerve</span></div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ 'success' if cat in ('success','info') else '' }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="post">
    <label>E-Mail</label>
    <input type="email" name="email" required autofocus>
    <label>Passwort</label>
    <input type="password" name="passwort" required>
    <button type="submit" class="btn">Einloggen</button>
  </form>
</div>
</body>
</html>
