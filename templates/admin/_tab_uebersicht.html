<div class="fcd-kpi-row">
  <div class="fcd-kpi">
    <h3>MRR</h3>
    <div class="value" data-kpi="mrr">—</div>
    <div class="delta">aktive Abos</div>
  </div>
  <div class="fcd-kpi">
    <h3>Kosten / Monat</h3>
    <div class="value" data-kpi="costs_mo">—</div>
    <div class="delta">API + Fixkosten</div>
  </div>
  <div class="fcd-kpi">
    <h3>Marge</h3>
    <div class="value" data-kpi="marge">—</div>
    <div class="delta">(Gewinn / Einnahmen)</div>
  </div>
  <div class="fcd-kpi">
    <h3>User</h3>
    <div class="value" data-kpi="active_users">—</div>
    <div class="delta">aktive Subscriptions</div>
  </div>
  <div class="fcd-kpi">
    <h3>Gewinn / Monat</h3>
    <div class="value" data-kpi="gewinn_mo">—</div>
    <div class="delta">vor Steuern</div>
  </div>
</div>

<div class="fcd-chart-row">
  <div class="fcd-chart-card">
    <h3>MRR + Kosten (12 Monate)</h3>
    <canvas id="fcd-chart-mrr-costs"></canvas>
  </div>
  <div class="fcd-chart-card">
    <h3>Marge-Entwicklung (12 Monate)</h3>
    <canvas id="fcd-chart-margin"></canvas>
  </div>
</div>

<div class="fcd-breakeven">
  <strong>BREAKEVEN:</strong> Live-Berechnung aus aktuellen KPIs. Ziel: Gewinn &gt; 0.
</div>
