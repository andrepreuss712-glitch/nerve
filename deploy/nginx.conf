# ── NERVE nginx Configuration ────────────────────────────────────────────────
# Domain: nerve.app
# Copy to: /etc/nginx/sites-available/nerve
# Enable: sudo ln -s /etc/nginx/sites-available/nerve /etc/nginx/sites-enabled/nerve
# Reload: sudo nginx -t && sudo systemctl reload nginx
# SSL certs: Run certbot --nginx -d nerve.app -d www.nerve.app first

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name nerve.app www.nerve.app;

    location / {
        return 301 https://nerve.app$request_uri;
    }
}

# ── www → apex redirect (HTTPS) ───────────────────────────────────────────────
# Separate server block (avoids nginx "if is evil" anti-pattern)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.nerve.app;

    ssl_certificate     /etc/letsencrypt/live/nerve.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nerve.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://nerve.app$request_uri;
}

# ── HTTPS server (apex domain) ────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name nerve.app;

    # SSL — managed by certbot
    ssl_certificate     /etc/letsencrypt/live/nerve.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nerve.app/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── RT Engine WebSocket proxy (Phase 04.8.1 — D-08) ─────────────────
    # Routes /ws/ to FastAPI RT Engine on port 8001
    # Must be BEFORE the catch-all location / block
    location /ws/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived WebSocket connections (1 hour timeout — matches Flask Socket.IO)
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 60s;
    }

    # ── Proxy to gunicorn ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # WebSocket upgrade headers (required for Socket.IO — D-08)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — long-lived WebSocket connections need generous values
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 60s;
    }
}
